<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | ADSYS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-5 col-lg-4">

        <div class="text-center mb-4">
            <h2 class="fw-bold">ADSYS Mağaza</h2>
            <p class="text-muted">Hesabınıza giriş yapın</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h4 class="mb-4 text-center">Giriş Yap</h4>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Kullanıcı Adı</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Kullanıcı adı veya şifre hatalı.
                        </div>
                    {% endif %}

                    <button type="submit" class="btn btn-warning w-100">
                        Giriş Yap
                    </button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-muted">Hesabınız yok mu?</span>
                    <a href="/hesap/kayit/" class="text-decoration-none">
                        Kayıt Ol
                    </a>
                </div>

            </div>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">
                Mağazaya dön
            </a>
        </div>

    </div>
</div>

</body>
</html>
