<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siparişi Tamamla</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ADSYS Mağaza</a>

        <div class="ms-auto">
            <a href="/sepetim/" class="btn btn-outline-light btn-sm">
                Sepete Dön
            </a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row g-4">

        <div class="col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4">Teslimat Bilgileri</h3>

                    <form method="post">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Ad</label>
                                <input type="text" name="first_name" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Soyad</label>
                                <input type="text" name="last_name" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">E-Posta</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefon</label>
                            <input type="text" name="phone" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Şehir</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Teslimat Adresi</label>
                            <textarea name="address" class="form-control" rows="4" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-warning btn-lg w-100">
                            Siparişi Onayla
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4">Sipariş Özeti</h3>

                    {% for item in items %}
                        <div class="d-flex justify-content-between border-bottom py-2">
                            <div>
                                <strong>{{ item.product.name }}</strong>
                                <br>
                                <small class="text-muted">Adet: {{ item.quantity }}</small>
                            </div>

                            <div class="fw-bold">
                                {{ item.product.price }} TL
                            </div>
                        </div>
                    {% endfor %}

                    <div class="d-flex justify-content-between mt-4">
                        <h4>Toplam</h4>
                        <h4 class="text-danger">{{ total }} TL</h4>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
