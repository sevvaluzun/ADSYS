<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siparişlerim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            ADSYS Mağaza
        </a>
    </div>
</nav>

<div class="container my-5">

    <h1 class="mb-4">Siparişlerim</h1>

    {% for order in orders %}
        <div class="card mb-3 shadow-sm">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-3">
                        <strong>Sipariş No</strong>
                        <br>
                        #{{ order.id }}
                        
                    </div>

                    <div class="col-md-3">
                        <strong>Tarih</strong>
                        <br>
                        {{ order.created_at }}
                    </div>

                    <div class="col-md-3">
                        <strong>Durum</strong>
                        <br>
                        {{ order.get_status_display }}
                    </div>

                    <div class="col-md-3">
                        <strong>Tutar</strong>
                        <br>
                        {{ order.total_price }} TL
                    </div>

                </div>
<a href="/hesap/siparislerim/{{ order.id }}/"
   class="btn btn-dark btn-sm mt-3">
    Detayı Gör
</a>
            </div>

        </div>

    {% empty %}

        <div class="alert alert-info">
            Henüz siparişiniz bulunmuyor.
        </div>

    {% endfor %}

</div>

</body>
</html>
